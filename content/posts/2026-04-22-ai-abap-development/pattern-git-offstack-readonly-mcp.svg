<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 640" width="1400" height="640" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowMain" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#009688"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1E88E5"/>
    </marker>
  </defs>

  <rect width="1400" height="640" fill="#ffffff"/>

  <!-- Developer -->
  <circle cx="110" cy="210" r="30" fill="none" stroke="#333" stroke-width="4"/>
  <line x1="110" y1="240" x2="110" y2="330" stroke="#333" stroke-width="4"/>
  <line x1="110" y1="275" x2="60" y2="305" stroke="#333" stroke-width="4"/>
  <line x1="110" y1="275" x2="160" y2="305" stroke="#333" stroke-width="4"/>
  <line x1="110" y1="330" x2="60" y2="395" stroke="#333" stroke-width="4"/>
  <line x1="110" y1="330" x2="160" y2="395" stroke="#333" stroke-width="4"/>
  <text x="110" y="440" text-anchor="middle" font-size="22" fill="#333">Developer</text>

  <!-- IDE -->
  <rect x="220" y="120" width="320" height="270" rx="14" fill="#e8eaf6" stroke="#3F51B5" stroke-width="4"/>
  <text x="380" y="168" text-anchor="middle" font-size="26" font-weight="bold" fill="#283593">Any IDE + LLM</text>
  <rect x="255" y="215" width="250" height="56" rx="10" fill="#fff" stroke="#9FA8DA" stroke-width="3"/>
  <text x="380" y="251" text-anchor="middle" font-size="21" fill="#303F9F">AI Agent</text>
  <rect x="255" y="290" width="250" height="92" rx="10" fill="#fff" stroke="#9FA8DA" stroke-width="3"/>
  <text x="380" y="327" text-anchor="middle" font-size="21" fill="#303F9F">Local Files</text>
  <text x="380" y="360" text-anchor="middle" font-size="18" fill="#777">(ABAP source code)</text>

  <!-- Developer to IDE -->
  <line x1="170" y1="260" x2="212" y2="260" stroke="#555" stroke-width="3" marker-end="url(#arrowMain)"/>

  <!-- Git Repository -->
  <rect x="650" y="120" width="300" height="270" rx="14" fill="#fce4ec" stroke="#E91E63" stroke-width="4"/>
  <text x="800" y="172" text-anchor="middle" font-size="26" font-weight="bold" fill="#880E4F">Git Repository</text>
  <rect x="684" y="220" width="232" height="56" rx="10" fill="#fff" stroke="#F48FB1" stroke-width="3"/>
  <text x="800" y="256" text-anchor="middle" font-size="21" fill="#C2185B">Source Code</text>
  <rect x="684" y="288" width="232" height="50" rx="10" fill="#fff" stroke="#F48FB1" stroke-width="3"/>
  <text x="800" y="321" text-anchor="middle" font-size="21" fill="#C2185B">Pull Requests</text>
  <rect x="684" y="344" width="232" height="40" rx="10" fill="#fff" stroke="#F48FB1" stroke-width="3"/>
  <text x="800" y="370" text-anchor="middle" font-size="18" fill="#C2185B">Code Reviews</text>

  <!-- IDE to Git -->
  <line x1="548" y1="260" x2="640" y2="260" stroke="#555" stroke-width="3" marker-end="url(#arrowMain)"/>
  <text x="594" y="242" text-anchor="middle" font-size="18" fill="#888">git push</text>

  <!-- Human in the loop -->
  <text x="1012" y="112" text-anchor="middle" font-size="20" fill="#333">Human in</text>
  <text x="1012" y="136" text-anchor="middle" font-size="20" fill="#333">the loop</text>
  <circle cx="1012" cy="170" r="26" fill="none" stroke="#333" stroke-width="3"/>
  <line x1="1012" y1="144" x2="1012" y2="124" stroke="#333" stroke-width="3"/>

  <!-- SAP -->
  <rect x="1060" y="170" width="280" height="200" rx="14" fill="#fff3e0" stroke="#FF9800" stroke-width="4"/>
  <text x="1200" y="225" text-anchor="middle" font-size="26" font-weight="bold" fill="#E65100">SAP System</text>
  <rect x="1096" y="270" width="208" height="48" rx="10" fill="#fff" stroke="#FFB74D" stroke-width="3"/>
  <text x="1200" y="302" text-anchor="middle" font-size="21" fill="#F57C00">ABAP Objects</text>
  <rect x="1096" y="330" width="208" height="36" rx="10" fill="#fff" stroke="#FFB74D" stroke-width="3"/>
  <text x="1200" y="354" text-anchor="middle" font-size="18" fill="#F57C00">abapGit</text>

  <!-- Git to SAP -->
  <line x1="958" y1="280" x2="1050" y2="305" stroke="#555" stroke-width="3" marker-end="url(#arrowMain)"/>
  <text x="1006" y="267" text-anchor="middle" font-size="18" fill="#888">abapGit</text>

  <!-- CI/CD lane -->
  <line x1="380" y1="120" x2="380" y2="70" stroke="#009688" stroke-width="3" stroke-dasharray="8,6"/>
  <line x1="800" y1="120" x2="800" y2="70" stroke="#009688" stroke-width="3" stroke-dasharray="8,6"/>
  <line x1="380" y1="70" x2="800" y2="70" stroke="#009688" stroke-width="3" stroke-dasharray="8,6" marker-start="url(#arrowTeal)" marker-end="url(#arrowTeal)"/>
  <rect x="500" y="38" width="180" height="64" rx="12" fill="#e0f2f1" stroke="#009688" stroke-width="3"/>
  <text x="590" y="65" text-anchor="middle" font-size="22" font-weight="bold" fill="#00695C">CI / CD</text>
  <text x="590" y="88" text-anchor="middle" font-size="15" fill="#00796B">Static Analysis and Tests</text>

  <!-- Read-only MCP lane -->
  <line x1="380" y1="390" x2="380" y2="505" stroke="#1E88E5" stroke-width="3" stroke-dasharray="8,6"/>
  <line x1="1200" y1="366" x2="1200" y2="505" stroke="#1E88E5" stroke-width="3" stroke-dasharray="8,6"/>
  <line x1="380" y1="505" x2="1200" y2="505" stroke="#1E88E5" stroke-width="3" stroke-dasharray="8,6" marker-start="url(#arrowBlue)" marker-end="url(#arrowBlue)"/>
  <rect x="590" y="450" width="400" height="86" rx="12" fill="#e3f2fd" stroke="#64B5F6" stroke-width="3"/>
  <text x="790" y="480" text-anchor="middle" font-size="24" font-weight="bold" fill="#1565C0">Read-only ADT MCP Server</text>
  <text x="790" y="505" text-anchor="middle" font-size="18" fill="#1E88E5">Context access only</text>
  <rect x="684" y="512" width="212" height="18" rx="8" fill="#e8f5e9" stroke="#66BB6A" stroke-width="2"/>
  <text x="790" y="525" text-anchor="middle" font-size="13" fill="#2E7D32">No direct write access</text>

  <!-- Risk -->
  <rect x="1060" y="420" width="280" height="52" rx="8" fill="#e8f5e9" stroke="#66BB6A" stroke-width="3"/>
  <text x="1200" y="454" text-anchor="middle" font-size="21" fill="#2E7D32">Low risk: gated access</text>
</svg>
