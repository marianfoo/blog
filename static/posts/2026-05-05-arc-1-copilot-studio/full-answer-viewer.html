<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Full Copilot Answer</title>
  <style>
    :root {
      color-scheme: dark light;
      --bg: #111827;
      --panel: #182235;
      --panel-border: #2f3b52;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --code: #0b1220;
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f8fafc;
        --panel: #ffffff;
        --panel-border: #dbe3ef;
        --text: #111827;
        --muted: #64748b;
        --accent: #2563eb;
        --code: #f1f5f9;
      }
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgb(96 165 250 / 0.16), transparent 34rem),
        radial-gradient(circle at top right, rgb(45 212 191 / 0.10), transparent 30rem),
        var(--bg);
      color: var(--text);
      font: 18px/1.65 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 48px auto;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .topline {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      align-items: center;
      margin-bottom: 26px;
      color: var(--muted);
      font-size: 15px;
    }

    .pill {
      border: 1px solid var(--panel-border);
      border-radius: 999px;
      padding: 4px 10px;
      background: rgb(255 255 255 / 0.04);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(32px, 5vw, 54px);
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .subtitle {
      margin: 0 0 30px;
      color: var(--muted);
      max-width: 780px;
    }

    .answer {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      padding: clamp(18px, 4vw, 34px);
      box-shadow: 0 24px 80px rgb(0 0 0 / 0.22);
    }

    pre {
      margin: 0;
      padding: clamp(18px, 3vw, 26px);
      border-radius: 16px;
      background: var(--code);
      color: var(--text);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      tab-size: 2;
      font: 16px/1.68 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
  </style>
</head>
<body>
  <main>
    <div class="topline">
      <a href="./">Back to blog post</a>
      <span class="pill" id="caseLabel">Full answer</span>
      <a id="rawLink" href="#">Open raw text</a>
    </div>
    <h1 id="title">Full Copilot Answer</h1>
    <p class="subtitle">Copied answer from the Copilot Studio test conversation. This view keeps the raw answer but makes it easier to read than the browser default for text files.</p>
    <section class="answer">
      <pre id="answer">Loading answer...</pre>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(window.location.search);
    const answerPath = params.get("answer") || "";
    const title = params.get("title") || "Full Copilot Answer";
    const caseLabel = params.get("case") || "Full answer";
    const allowedPath = /^conversations\/[0-9]{2}\/full-answer\.txt$/;

    document.title = title;
    document.getElementById("title").textContent = title;
    document.getElementById("caseLabel").textContent = caseLabel;

    if (!allowedPath.test(answerPath)) {
      document.getElementById("answer").textContent = "Invalid answer path.";
    } else {
      document.getElementById("rawLink").href = answerPath;
      fetch(answerPath)
        .then((response) => {
          if (!response.ok) {
            throw new Error("Could not load answer.");
          }
          return response.text();
        })
        .then((text) => {
          document.getElementById("answer").textContent = text.trim();
        })
        .catch(() => {
          document.getElementById("answer").textContent = "Could not load the copied answer.";
        });
    }
  </script>
</body>
</html>
